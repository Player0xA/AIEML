# Brand Impersonation Detection Configuration
# Default brand list for emltriage F1 (Domain/Brand Impersonation Detection)
# Users can override via CLI: --brands-file custom_brands.yaml
# Or filter at runtime via GUI

version: "1.0"
description: "Default brand list for impersonation detection"

# Scoring algorithm weights (can be overridden)
scoring:
  algorithm: "weighted"  # Options: simple, weighted, threshold
  weights:
    levenshtein: 0.35
    homoglyph: 0.30
    keyword_match: 0.20
    punycode: 0.15
  threshold: 0.75  # Minimum score to flag as impersonation (0.0-1.0)
  max_distance: 3  # Maximum Levenshtein distance to consider

# Risk score integration
risk_integration:
  enabled: true
  weight_impersonation_detected: 30
  weight_high_confidence: 40  # Score >= 0.85

