# Advanced detection settings
advanced:
  # Homoglyph character mappings (confusable unicode characters)
  # Format: unicode_char: ascii_equivalent
  homoglyph_map:
    "а": "a"  # Cyrillic а (U+0430) looks like Latin a
    "е": "e"  # Cyrillic е (U+0435) looks like Latin e
    "о": "o"  # Cyrillic о (U+043E) looks like Latin o
    "р": "p"  # Cyrillic р (U+0440) looks like Latin p
    "с": "c"  # Cyrillic с (U+0441) looks like Latin c
    "х": "x"  # Cyrillic х (U+0445) looks like Latin x
    "і": "i"  # Cyrillic і (U+0456) looks like Latin i
    "ј": "j"  # Cyrillic ј (U+0458) looks like Latin j
    "ѕ": "s"  # Cyrillic ѕ (U+0455) looks like Latin s
    "ɡ": "g"  # Latin ɡ (U+0261) looks like g
    "ɑ": "a"  # Latin ɑ (U+0251) looks like a
    "０": "0"  # Fullwidth 0
    "１": "1"  # Fullwidth 1
    "２": "2"  # Fullwidth 2
    "３": "3"  # Fullwidth 3
    "４": "4"  # Fullwidth 4
    "５": "5"  # Fullwidth 5
    "６": "6"  # Fullwidth 6
    "７": "7"  # Fullwidth 7
    "８": "8"  # Fullwidth 8
    "９": "9"  # Fullwidth 9
    "𝟎": "0"  # Mathematical double-struck 0
    "𝟏": "1"  # Mathematical double-struck 1
    "𝟐": "2"  # Mathematical double-struck 2
    "𝟑": "3"  # Mathematical double-struck 3
    "𝟒": "4"  # Mathematical double-struck 4
    "𝟓": "5"  # Mathematical double-struck 5
    "𝟔": "6"  # Mathematical double-struck 6
    "𝟕": "7"  # Mathematical double-struck 7
    "𝟖": "8"  # Mathematical double-struck 8
    "𝟗": "9"  # Mathematical double-struck 9

  # Ignored TLDs (don't flag as impersonation if domain uses these)
  # These are often used legitimately for testing or personal sites
  ignored_tlds:
    - "local"
    - "localhost"
    - "test"
    - "example"
    - "invalid"

  # Known infrastructure domains to exclude from impersonation checks
  # (already filtered by ioc_filter, but added here for defense in depth)
  infrastructure_domains:
    - "outlook.com"
    - "office365.com"
    - "microsoftonline.com"
    - "protection.outlook.com"
    - "mail.protection.outlook.com"
    - "prod.outlook.com"
    - "google.com"
    - "gmail.com"
    - "googlemail.com"
    - "yahoo.com"
    - "hotmail.com"
    - "live.com"
    - "msn.com"
    - "icloud.com"
    - "me.com"
    - "mac.com"
    - "aol.com"
    - "protonmail.com"
    - "zoho.com"
